# Local Postgres for `-store postgres`. Credentials come from the environment
# (see .env.example) — nothing is hard-coded here beyond local dev defaults.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiff}
      POSTGRES_DB: ${POSTGRES_DB:-kiff}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kiff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kiff}"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  kiff_pgdata:
